<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault | Gestion de Films</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/auth.css">

    <!-- Firebase SDK (ES Modules via CDN) -->
    <!-- We will import Firebase in our JS modules directly -->
</head>
<body>
    <div id="app" class="app-container">
        <!-- Auth View -->
        <div id="auth-view" class="view hidden">
            <div class="auth-container glass-panel">
                <div class="auth-header">
                    <i data-lucide="film" class="logo-icon"></i>
                    <h1>CineVault</h1>
                    <p>Votre collection cinématographique personnelle.</p>
                </div>
                <div class="auth-forms">
                    <form id="login-form">
                        <h2>Connexion</h2>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="login-email" required placeholder="nom@exemple.com">
                        </div>
                        <div class="form-group">
                            <label>Mot de passe</label>
                            <input type="password" id="login-password" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-full">Se connecter</button>
                    </form>
                    <div class="divider"><span>OU</span></div>
                    <button id="google-login-btn" class="btn btn-outline w-full">
                        <svg class="google-icon" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Continuer avec Google
                    </button>
                    <p class="auth-switch">Pas encore de compte ? <a href="#" id="show-register">S'inscrire</a></p>
                </div>
            </div>
        </div>

        <!-- Main App Layout (Visible if logged in) -->
        <div id="main-layout" class="layout hidden">
            <!-- Sidebar Navigation -->
            <nav class="sidebar glass-panel">
                <div class="sidebar-brand">
                    <i data-lucide="film" class="logo-icon text-accent"></i>
                    <h2>CineVault</h2>
                </div>
                <ul class="nav-links">
                    <li><a href="#home" class="nav-item active" data-target="home"><i data-lucide="home"></i> Accueil</a></li>
                    <li><a href="#search" class="nav-item" data-target="search"><i data-lucide="search"></i> Recherche</a></li>
                    <li><a href="#seen" class="nav-item" data-target="seen"><i data-lucide="check-circle"></i> Films Vus</a></li>
                    <li><a href="#watchlist" class="nav-item" data-target="watchlist"><i data-lucide="bookmark"></i> À Voir</a></li>
                    <li><a href="#favorites" class="nav-item" data-target="favorites"><i data-lucide="heart"></i> Favoris</a></li>
                    <li><a href="#stats" class="nav-item" data-target="stats"><i data-lucide="bar-chart-2"></i> Statistiques</a></li>
                </ul>
                <div class="sidebar-footer">
                    <div class="user-info">
                        <div class="avatar" id="user-avatar">U</div>
                        <span id="user-email" class="truncate">user@email.com</span>
                    </div>
                    <button id="logout-btn" class="btn-icon" title="Se déconnecter"><i data-lucide="log-out"></i></button>
                </div>
            </nav>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Topbar for mobile -->
                <header class="mobile-topbar hidden-desktop">
                    <div class="sidebar-brand">
                        <i data-lucide="film" class="logo-icon text-accent"></i>
                        <h2>CineVault</h2>
                    </div>
                    <button id="mobile-menu-btn" class="btn-icon"><i data-lucide="menu"></i></button>
                </header>

                <div id="router-view" class="content-wrapper">
                    <!-- Views will be injected here by router -->
                </div>
            </main>
        </div>

        <!-- Movie Details Modal -->
        <div id="movie-modal" class="modal-overlay hidden">
            <div class="modal-content glass-panel">
                <button class="close-modal-btn"><i data-lucide="x"></i></button>
                <div id="modal-body">
                    <!-- Injected dynamically -->
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- Scripts (type module is important for imports) -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
